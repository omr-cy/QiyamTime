[project]
name = "قيام الأنبياء"
version = "0.1.0"
description = "هذا تطبيق لحساب الوقت التقريبي لنصف الليل وثلثله وسدسه."
readme = "README.md"
requires-python = ">=3.9"
authors = [{ name = "Omr Ashrf", email = "omr.ashrf.prog@gamil.com" }]
dependencies = [
  "flet==0.27.4", 
  "lxml==5.3.0", 
  "beautifulsoup4==4.10.0", 
  "httpx[http2]", 
  "fake-useragent",
]

[tool.flet]
org = "com.mycompany"
