name: Build Flet app

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Flutter
        id: flutter-setup
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies and Build APK
        env:
          FLUTTER_PATH: ${{ steps.flutter-setup.outputs.flutter-path }}
        run: |
          echo "${FLUTTER_PATH}/bin" >> $GITHUB_PATH
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          echo "--- Verifying Flutter installation (from explicit PATH) ---"
          which flutter
          flutter --version
          echo "--- Starting Flet build ---"
          flet build apk --verbose

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/apk/*.apk
